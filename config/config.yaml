# 情绪音乐生成器 - 配置文件

camera:
  device_id: 0
  width: 640
  height: 480
  fps_target: 30

detection:
  model_path: "models/shape_predictor_68_face_landmarks.dat"
  # 检测间隔 (毫秒)，0 表示每帧检测
  interval_ms: 0
  # 检测缩放倍数 (越大越快但越粗糙)
  pyramid_upscales: 1

emotion:
  # 情绪识别 ONNX 模型路径
  model_path: "models/emotion_detector/enet_b0_8_best_afew.onnx"
  # 情绪平滑窗口大小
  smoothing_window: 5

music:
  default_num_notes: 8
  sample_rate: 44100
  master_volume: 0.3

logging:
  # 是否在画面上显示调试信息
  show_fps: true
  show_emotion: true
  show_landmarks: true
  show_face_box: true

# Web 远程控制
web:
  enabled: true
  port: 8080

# 本地音乐播放（按情绪匹配 music/<mood>/ 下的音频文件）
local_music:
  enabled: true
  library_path: "music"

# 情绪日记日志
logger:
  enabled: true
  data_dir: "data"
